name: Weekly Paper Survey

on:
  schedule:
    # 毎週月曜 0:00 UTC = 日本時間 9:00
    - cron: '0 0 * * 1'
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  survey:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code - Paper Survey
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            今日は $(date +%Y-%m-%d) です。
            prompts/survey-prompt.md の指示に従って、
            小児科全般の週次論文サーベイを実行してください。

            実行手順:
            1. config/specialty.json と config/journals.json を読み込む
            2. state/survey-state.json を読み込む（重複排除・日付フィルタ用）
            3. prompts/survey-prompt.md を読む
            4. CLAUDE.md のルールに従う
            5. 検索対象ドメインを決定する（state の last_searched と frequency から判断）
            6. PubMed E-utilities API (curl) でドメイン別に論文を検索する
               - 同一ドメイン内のクエリはOR結合して効率化
               - 日付フィルタは state の last_searched を使用
            7. クエリ間重複排除（PMID単位）
            8. 既報重複排除（state の reported_pmids と照合）
            9. Europe PMC API でOA情報を取得する
            10. 選定した論文の日本語要約を生成する
            11. reports/$(date +%Y-%m-%d)/ フォルダに report.md, survey.json を保存する
            12. OA論文のPDFをダウンロードする
            13. state/survey-state.json を更新する（既報PMID追加、last_searched更新、統計更新）
          show_full_output: true
          settings: |
            {
              "defaultMode": "dontAsk",
              "permissions": {
                "allow": [
                  "Bash(*)",
                  "Read",
                  "Write",
                  "Edit",
                  "Glob",
                  "Grep",
                  "WebFetch(*)",
                  "WebSearch(*)"
                ]
              }
            }
          claude_args: "--model claude-sonnet-4-6 --max-turns 40"

      - name: Commit and push report + state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # claude-code-action が認証情報を上書きするため再設定
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 新しいレポートまたはstate更新があればコミット
          if [ -n "$(git status --porcelain reports/ state/)" ]; then
            git add reports/ state/
            git commit -m "docs: weekly paper survey $(date +%Y-%m-%d)"
            git push
            echo "REPORT_CREATED=true" >> $GITHUB_ENV
            REPORT_DATE=$(date +%Y-%m-%d)
            echo "REPORT_DATE=${REPORT_DATE}" >> $GITHUB_ENV
          else
            echo "No new report generated."
            echo "REPORT_CREATED=false" >> $GITHUB_ENV
          fi

      - name: Notify Discord
        if: env.REPORT_CREATED == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          REPORT_DATE="${{ env.REPORT_DATE }}"

          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            # PDFダウンロード数を取得
            PDF_COUNT=$(find "reports/${REPORT_DATE}" -name "*.pdf" 2>/dev/null | wc -l)
            # ドメイン検索数を取得
            DOMAIN_COUNT=$(jq -r '.domains_searched | length' "reports/${REPORT_DATE}/survey.json" 2>/dev/null || echo "?")
            # 新規論文数を取得
            PAPER_COUNT=$(jq -r '.papers | length' "reports/${REPORT_DATE}/survey.json" 2>/dev/null || echo "?")

            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"📚 **週次論文サーベイ完了** (${REPORT_DATE})\\nレポート: ${REPO_URL}/blob/main/reports/${REPORT_DATE}/report.md\\n検索ドメイン: ${DOMAIN_COUNT}領域 | 新規論文: ${PAPER_COUNT}本 | PDF: ${PDF_COUNT}本\"}" \
              "$DISCORD_WEBHOOK_URL"
          fi
